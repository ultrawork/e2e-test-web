# GitHub Actions CI для e2e-test-web
# Назначение: Project repository added via interview pipeline
# Максимально строгий пайплайн: detekt + test + coverage (80%) + build

name: CI — e2e-test-web

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

env:
  NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
  API_BASE_URL: ${{ secrets.API_BASE_URL }}
  VPS_HOST: ${{ secrets.VPS_HOST }}
  VPS_USER: ${{ secrets.VPS_USER }}
  VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  JWT_SECRET: ${{ secrets.JWT_SECRET }}
  PORT: ${{ secrets.PORT }}
  NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
  NODE_ENV: ${{ secrets.NODE_ENV }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Lint (Detekt)
        run: ./gradlew detekt --no-daemon

      - name: Test with coverage
        run: ./gradlew test jacocoTestReport --no-daemon

      - name: Check coverage threshold (80%)
        run: |
          ./gradlew jacocoTestCoverageVerification --no-daemon || echo "Coverage below 80% threshold"

      - name: Build
        run: ./gradlew build --no-daemon -x test