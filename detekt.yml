build:
  maxIssues: 10
  weights:
    complexity: 2
    LongParameterList: 1
    style: 1
    comments: 1

complexity:
  active: true
  ComplexCondition:
    active: true
    threshold: 4
  ComplexMethod:
    active: true
    threshold: 10
  LongMethod:
    active: true
    threshold: 60
  LongParameterList:
    active: true
    threshold: 5
  NestedBlockDepth:
    active: true
    threshold: 4
  TooManyFunctions:
    active: true
    threshold: 10

coroutines:
  active: true

empty-blocks:
  active: true

exceptions:
  active: true

formatting:
  active: false
  MaxLineLength:
    active: true
    maxLineLength: 120
    excludeCommentStatements: false

naming:
  active: true
  ClassNaming:
    active: true
    classPattern: '[A-Z][a-zA-Z0-9]*'
  FunctionNaming:
    active: true
    functionPattern: '[a-z][a-zA-Z0-9]*'
  VariableNaming:
    active: true
    variablePattern: '[a-z][a-zA-Z0-9]*'

performance:
  active: true

potential-bugs:
  active: true
  UnusedPrivateMember:
    active: true
    searchInNestedClasses: true

style:
  active: true
  MagicNumber:
    active: true
    ignoreNumbers: '-1,0,1,2,100'
  ReturnCount:
    active: true
    max: 3